<div class="favorites-page">
    <div class="favorites-page__header">
        <h1 class="favorites-page__title">Избранное</h1>
        @if((favoritesService.favorites$ | async)?.length !==0){
        <a class="favorites-return" [routerLink]="['']">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3" />
            </svg>
            <span>Вернуться в каталог</span>
        </a>
        }
    </div>
    @if((favoritesService.favorites$ | async)?.length ===0){
    <div class="favorites-empty">
        <p>В избранном пока ничего нет</p>
        <a class="favorites-empty__link" [routerLink]="['']">Перейти в каталог</a>
    </div>
    }
    @else {
    <div class="favorites-grid">
        @for (item of (favoriteItems$ | async)!; track item.productId){
        <app-favorites-item [item]="item" (remove)="onRemove($event)" (addToCart)="onAddToCart($event)"></app-favorites-item>
        }
    </div>
    }
</div>
