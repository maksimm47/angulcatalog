<div class="header">
    <div class="logo-container">
        <img src="/media/svg/logo.svg" alt="logo" class="header__logo">
        <span class="header__logo-text">Nocturne</span>
    </div>
    <div class="header__button-container">
        <button class="btn btn--icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            <span>Поддержка</span>
        </button>
        <button class="btn btn--icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                </path>
            </svg>
            <span>Избранное</span>
        </button>
        <button class="btn btn--icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span>Корзина</span>
        </button>
        <div class="header__divider"></div>

        <ng-container *ngIf="authService.currentUser$ | async as user; else loggedOut">
            <span class="user-name">{{ user.name }}</span>
            <button class="btn btn--outline" (click)="onLogout()">Выйти</button>
        </ng-container>
        
        <ng-template #loggedOut>
            <button class="btn btn--outline" [routerLink]="['/login']">Войти</button>
            <button class="btn btn--filled" [routerLink]="['/register']">Регистрация</button>
        </ng-template>
    </div>
</div>
