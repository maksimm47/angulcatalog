<div class="cart-item">
    <img [src]="item.imageUrl" [alt]="item.name" class="cart-item__image">
    <div class="cart-item__info">
        <h3 class="cart-item__name">{{item.name}}</h3>
        <span class="cart-item__price">{{item.price}} ₽</span>
    </div>
    <div class="cart-item__quantity">
        <button class="qty-btn" (click)="onDecrease()">−</button>
        <span class="qty-value">{{item.quantity}}</span>
        <button class="qty-btn" (click)="onIncrease()">+</button>
    </div>
    <span class="cart-item__total">{{ item.price * item.quantity }} ₽</span>
    <button class="cart-item__remove" (click)="onRemove()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
            <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"></path>
        </svg>
    </button>
</div>
