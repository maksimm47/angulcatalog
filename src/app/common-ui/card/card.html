@if (product){
<div class="card">
    <img [src]="product.imageUrl" [alt]="product.name" class="card__image">
    <div class="card__bottom">
        <div class="card__text">{{ product.name }}</div>
        <div class="card__price">{{ product.price }} {{product.currency}}</div>
    </div>
    <div class="button-wrapper">
        <button class="btn product" (click)="onProductButton()">Перейти</button>
        <button class="btn" (click)="onCartButton()">В корзину</button>
    </div>
</div>
}
