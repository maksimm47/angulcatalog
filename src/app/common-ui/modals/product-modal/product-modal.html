<div class="modal-wrapper">
    <div class="modal-block">
        <button class="close-btn" (click)="onCloseButton()" aria-label="Закрыть">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M1 1L17 17M17 1L1 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
        </button>
        <div class="header">
            <img [src]="product.imageUrl || '/media/img/car.jpg'" [alt]="product.name" class="header__image">
            <div class="header__right">
                <div class="header__right-top">
                    <p>{{product.name}}</p>
                </div>
                <div class="header__right-description">
                    {{product.description}}
                </div>
            </div>
        </div>
        <div class="footer">
            <span>{{product.price}} {{product.currency}}</span>
            <button>В корзину</button>
        </div>
    </div>
</div>
