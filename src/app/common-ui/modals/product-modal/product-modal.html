<div class="modal-wrapper">
    <div class="modal-block">
        <button class="close-btn" (click)="onCloseButton()" aria-label="Закрыть">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M1 1L17 17M17 1L1 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
        </button>
        <div class="header">
            <img [src]="product.imageUrl || '/media/img/car.jpg'" [alt]="product.name" class="header__image">
            <div class="header__right">
                <div class="header__right-top">
                    <p>{{product.name}}</p>
                </div>
                <div class="header__right-description">
                    {{product.description}}
                </div>
            </div>
        </div>
        <div class="footer">
            <span>{{product.price}} {{product.currency}}</span>
            <div class="right-buttons">
                <button (click)="onAddToCart()">В корзину</button>
                <button class="btn btn--icon" (click)="onToggleFavorite()">
                    @if (isFavorite$ | async) {
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                    </svg>
                    } @else {
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                    </svg>
                    }
                </button>
            </div>
        </div>
    </div>
</div>
